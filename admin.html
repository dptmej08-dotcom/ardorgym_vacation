<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRFlow · 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--primary:#5B5FEF;--primary-dark:#4347CC;--primary-light:#EEEEFF;--success:#22C55E;--success-light:#DCFCE7;--danger:#EF4444;--danger-light:#FEE2E2;--warning:#F59E0B;--warning-light:#FEF3C7;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;--r:12px;--sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}
  /* 로그인 오버레이 */
  .overlay{position:fixed;inset:0;background:linear-gradient(135deg,#EEF2FF,#F0FDF4);display:flex;align-items:center;justify-content:center;z-index:999}
  .lcard{background:white;border-radius:20px;box-shadow:0 8px 40px rgba(91,95,239,.15);padding:40px;width:380px;animation:fu .4s ease}
  @keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .llogo{text-align:center;margin-bottom:28px}
  .llogo-i{width:56px;height:56px;background:linear-gradient(135deg,#5B5FEF,#8B5CF6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(91,95,239,.3)}
  .llogo-n{font-family:'Gmarket Sans',sans-serif;font-size:22px;font-weight:700;color:var(--primary)}
  .llogo-s{font-size:12px;color:var(--gray-400);margin-top:2px}
  .lt{font-size:18px;font-weight:700;color:var(--gray-900);margin-bottom:4px}
  .ls{font-size:13px;color:var(--gray-400);margin-bottom:24px}
  .fg{margin-bottom:14px}
  .fl{display:block;font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:6px}
  .fi{width:100%;padding:11px 16px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:'Pretendard',sans-serif;color:var(--gray-800);outline:none;transition:all .2s;background:var(--gray-50)}
  .fi:focus{border-color:var(--primary);background:white;box-shadow:0 0 0 3px rgba(91,95,239,.1)}
  .btn-l{width:100%;padding:13px;border:none;border-radius:10px;background:var(--primary);color:white;font-size:15px;font-weight:700;font-family:'Pretendard',sans-serif;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:0 4px 16px rgba(91,95,239,.3);display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-l:hover{background:var(--primary-dark);transform:translateY(-1px)}
  .btn-l:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .lerr{background:var(--danger-light);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:12px;display:none}
  .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--gray-400);text-decoration:none}
  .back:hover{color:var(--primary)}
  /* 네비 */
  .navbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .brand{font-family:'Gmarket Sans',sans-serif;font-size:18px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px}
  .brand-i{width:28px;height:28px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px}
  .abadge{background:linear-gradient(135deg,#5B5FEF,#8B5CF6);color:white;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700}
  .btn-lo{padding:7px 16px;border:1.5px solid var(--gray-200);background:white;border-radius:8px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
  .btn-lo:hover{color:var(--danger);border-color:var(--danger)}
  /* 메인 */
  .container{max-width:1100px;margin:0 auto;padding:32px 24px}
  .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .sc{background:white;border-radius:var(--r);box-shadow:var(--sh);padding:20px;display:flex;align-items:center;gap:14px}
  .si{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .sv{font-size:26px;font-weight:800;color:var(--gray-900);line-height:1}
  .sl{font-size:12px;color:var(--gray-400);margin-top:2px}
  .tabs{display:flex;background:white;border-radius:var(--r);box-shadow:var(--sh);padding:6px;margin-bottom:24px}
  .tb{flex:1;padding:10px 16px;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--gray-500);transition:all .2s;font-family:'Pretendard',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
  .tb.active{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(91,95,239,.35)}
  .bn{background:var(--danger);color:white;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700}
  .tb.active .bn{background:rgba(255,255,255,.25)}
  .tp{display:none}.tp.active{display:block;animation:fi2 .2s ease}
  @keyframes fi2{from{opacity:0}to{opacity:1}}
  .card{background:white;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:20px}
  .ch{padding:18px 20px 14px;border-bottom:1px solid var(--gray-100);font-weight:700;font-size:15px;color:var(--gray-700);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .cb{padding:20px}
  .rl{display:flex;flex-direction:column;gap:12px}
  .ri{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:all .2s}
  .ri:hover{border-color:var(--gray-200);background:white;box-shadow:var(--sh)}
  .rav{width:40px;height:40px;border-radius:50%;background:var(--primary-light);color:var(--primary);font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ri-info{flex:1}
  .rn{font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:2px}
  .rm{font-size:12px;color:var(--gray-400);margin-bottom:4px}
  .rp{font-size:13px;color:var(--gray-600);font-weight:500}
  .rr{font-size:12px;color:var(--gray-400);margin-top:2px}
  .sb{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;flex-shrink:0}
  .sp{background:var(--warning-light);color:var(--warning)}
  .sa{background:var(--success-light);color:var(--success)}
  .sr{background:var(--danger-light);color:var(--danger)}
  .ra{display:flex;gap:8px;flex-shrink:0}
  .btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all .2s}
  .btn-s{background:var(--success);color:white}.btn-s:hover{background:#16A34A}
  .btn-d{background:var(--danger);color:white}.btn-d:hover{background:#DC2626}
  .btn-o{background:white;color:var(--gray-600);border:1.5px solid var(--gray-200)}.btn-o:hover{background:var(--gray-50)}
  .btn-p{background:var(--primary);color:white}.btn-p:hover{background:var(--primary-dark)}
  .emp-table{width:100%;border-collapse:collapse}
  .emp-table th{text-align:left;padding:10px 16px;font-size:12px;font-weight:700;color:var(--gray-400);text-transform:uppercase;border-bottom:1px solid var(--gray-100)}
  .emp-table td{padding:14px 16px;font-size:14px;border-bottom:1px solid var(--gray-50);vertical-align:middle}
  .emp-table tr:last-child td{border-bottom:none}
  .emp-table tr:hover td{background:var(--gray-50)}
  .eav{width:34px;height:34px;border-radius:50%;background:var(--primary-light);color:var(--primary);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .enc{display:flex;align-items:center;gap:10px}
  .di{padding:5px 10px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--gray-700);outline:none;width:130px}
  .di:focus{border-color:var(--primary)}
  /* 모달 */
  .modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
  .modal-wrap.open{display:flex}
  .modal{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:28px;width:420px;animation:fu .2s ease}
  .mt{font-size:18px;font-weight:700;margin-bottom:4px}
  .ms{font-size:13px;color:var(--gray-400);margin-bottom:20px}
  .ma{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
  .fta{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:'Pretendard',sans-serif;resize:vertical;min-height:80px;outline:none}
  .fta:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(91,95,239,.1)}
  /* 설정 */
  .settings-fi{width:100%;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:'Pretendard',sans-serif;outline:none;margin-bottom:12px}
  .settings-fi:focus{border-color:var(--primary)}
  /* 토스트 */
  .tw{position:fixed;bottom:32px;right:32px;z-index:2000;display:flex;flex-direction:column;gap:10px}
  .toast{background:var(--gray-900);color:white;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:ti .3s ease,to .3s ease 2.7s forwards;display:flex;align-items:center;gap:8px}
  .toast.s{background:var(--success)}.toast.e{background:var(--danger)}.toast.w{background:var(--warning)}
  @keyframes ti{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes to{from{opacity:1}to{opacity:0}}
  .empty{text-align:center;padding:50px 20px;color:var(--gray-400)}
  .empty .icon{font-size:42px;margin-bottom:10px}
  .empty p{font-size:14px}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:800px){.sg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div class="overlay" id="loginOverlay">
  <div class="lcard">
    <div class="llogo">
      <div class="llogo-i">🛡️</div>
      <div class="llogo-n">HRFlow Admin</div>
      <div class="llogo-s">관리자 전용 페이지</div>
    </div>
    <div class="lt">관리자 로그인</div>
    <div class="ls">관리자 계정으로 로그인해주세요</div>
    <div class="lerr" id="lerr"></div>
    <div class="fg"><label class="fl">관리자 ID</label><input type="text" class="fi" id="aId" placeholder="admin"></div>
    <div class="fg"><label class="fl">비밀번호</label><input type="password" class="fi" id="aPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <button class="btn-l" id="loginBtn" onclick="doAdminLogin()">관리자 로그인</button>
    <a href="index.html" class="back">← 직원 로그인으로 돌아가기</a>
  </div>
</div>

<!-- 네비 -->
<nav class="navbar">
  <div class="brand"><div class="brand-i">🌿</div>HRFlow<span class="abadge">🛡️ ADMIN</span></div>
  <button class="btn-lo" onclick="doAdminLogout()">로그아웃</button>
</nav>

<!-- 메인 -->
<div class="container">
  <div class="sg">
    <div class="sc"><div class="si" style="background:#EEF2FF">👥</div><div><div class="sv" id="stTotal">-</div><div class="sl">전체 직원</div></div></div>
    <div class="sc"><div class="si" style="background:#FEF3C7">⏳</div><div><div class="sv" id="stPend">-</div><div class="sl">결재 대기</div></div></div>
    <div class="sc"><div class="si" style="background:#DCFCE7">✅</div><div><div class="sv" id="stApp">-</div><div class="sl">승인 완료</div></div></div>
    <div class="sc"><div class="si" style="background:#FEE2E2">🕐</div><div><div class="sv" id="stWait">-</div><div class="sl">가입 승인 대기</div></div></div>
  </div>
  <div class="tabs">
    <button class="tb active" onclick="switchTab('requests')">📋 휴가 결재 <span class="bn" id="pendBadge" style="display:none">0</span></button>
    <button class="tb" onclick="switchTab('employees')">👥 직원 관리 <span class="bn" id="waitBadge" style="display:none">0</span></button>
    <button class="tb" onclick="switchTab('settings')">⚙️ 설정</button>
  </div>
  <!-- 결재 탭 -->
  <div class="tp active" id="tp-requests">
    <div class="card"><div class="ch">⏳ 결재 대기 중</div><div class="cb"><div class="rl" id="pendList"></div></div></div>
    <div class="card"><div class="ch">📁 결재 완료 내역</div><div class="cb"><div class="rl" id="doneList"></div></div></div>
  </div>
  <!-- 직원 탭 -->
  <div class="tp" id="tp-employees">
    <div class="card" id="waitCard"><div class="ch" style="color:var(--warning)">⏳ 가입 승인 대기</div><div class="cb"><div class="rl" id="waitList"></div></div></div>
    <div class="card">
      <div class="ch">👥 전체 직원 목록<button class="btn btn-p" onclick="loadEmployees()" style="font-size:12px;padding:6px 12px">새로고침</button></div>
      <div style="padding:0"><table class="emp-table"><thead><tr><th>이름</th><th>입사일</th><th>부서/직급</th><th>연차 현황</th><th>상태</th><th>관리</th></tr></thead><tbody id="empBody"></tbody></table></div>
    </div>
  </div>
  <!-- 설정 탭 -->
  <div class="tp" id="tp-settings">
    <div class="card"><div class="ch">🔒 관리자 비밀번호 변경</div>
      <div class="cb" style="max-width:400px">
        <label class="fl">현재 비밀번호</label><input type="password" class="settings-fi" id="curPw" placeholder="현재 비밀번호">
        <label class="fl">새 비밀번호</label><input type="password" class="settings-fi" id="newPw" placeholder="새 비밀번호">
        <label class="fl">새 비밀번호 확인</label><input type="password" class="settings-fi" id="newPw2" placeholder="재입력">
        <button class="btn btn-p" onclick="changePw()" style="padding:11px 20px;font-size:14px">변경하기</button>
      </div>
    </div>
  </div>
</div>

<!-- 반려 모달 -->
<div class="modal-wrap" id="rejModal">
  <div class="modal">
    <div class="mt">🚫 반려 사유 입력</div>
    <div class="ms">반려 사유를 작성하면 직원에게 전달됩니다.</div>
    <textarea class="fta" id="rejReason" placeholder="반려 사유를 입력해주세요..."></textarea>
    <div class="ma"><button class="btn btn-o" onclick="closeModal()">취소</button><button class="btn btn-d" onclick="confirmRej()">반려 처리</button></div>
  </div>
</div>
<div class="tw" id="tw"></div>

<script>
const SURL='https://raqslexylkpbpkbpwpzr.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhcXNsZXh5bGtwYnBrYnB3cHpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDEzMTYsImV4cCI6MjA5Mjk3NzMxNn0.ucf-7PrRmAHsl5_bq_7LYzIUUZ5Tf1Eksa4ihV1eLC0';
const sb=supabase.createClient(SURL,SKEY);

// 관리자 계정 (로컬스토리지)
function getAdminCreds(){return JSON.parse(localStorage.getItem('hrflow_admin')||'{"id":"admin","pw":"admin1234"}');}

function doAdminLogin(){
  const id=document.getElementById('aId').value.trim();
  const pw=document.getElementById('aPw').value;
  const c=getAdminCreds();
  const err=document.getElementById('lerr');
  if(id===c.id&&pw===c.pw){
    localStorage.setItem('hrflow_admin_auth','1');
    document.getElementById('loginOverlay').style.display='none';
    loadAll();
  }else{
    err.textContent='❌ 아이디 또는 비밀번호가 틀렸습니다.';
    err.style.display='block';
    setTimeout(()=>err.style.display='none',3000);
  }
}
function doAdminLogout(){localStorage.removeItem('hrflow_admin_auth');window.location.reload();}
window.addEventListener('load',()=>{
  if(localStorage.getItem('hrflow_admin_auth')==='1'){
    document.getElementById('loginOverlay').style.display='none';
    loadAll();
  }
});

function switchTab(n){
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('active',['requests','employees','settings'][i]===n));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.getElementById('tp-'+n).classList.add('active');
  if(n==='employees')loadEmployees();
}

function toast(msg,type=''){const w=document.getElementById('tw');const t=document.createElement('div');t.className=`toast ${type}`;const ic={s:'✅',e:'❌',w:'⚠️'};t.innerHTML=`${ic[type]||'💬'} ${msg}`;w.appendChild(t);setTimeout(()=>t.remove(),3100);}
function fmtDate(d){if(!d)return'-';const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}

async function loadAll(){
  await Promise.all([loadStats(),loadRequests()]);
}

async function loadStats(){
  const[{count:total},{count:pend},{count:app},{count:wait}]=await Promise.all([
    sb.from('users').select('*',{count:'exact',head:true}).eq('approved',true),
    sb.from('vacation_requests').select('*',{count:'exact',head:true}).eq('status','pending'),
    sb.from('vacation_requests').select('*',{count:'exact',head:true}).eq('status','approved'),
    sb.from('users').select('*',{count:'exact',head:true}).eq('approved',false),
  ]);
  document.getElementById('stTotal').textContent=total||0;
  document.getElementById('stPend').textContent=pend||0;
  document.getElementById('stApp').textContent=app||0;
  document.getElementById('stWait').textContent=wait||0;
  const pb=document.getElementById('pendBadge');pb.style.display=pend?'':'none';pb.textContent=pend;
  const wb=document.getElementById('waitBadge');wb.style.display=wait?'':'none';wb.textContent=wait;
}

const ti={annual:'🌿',summer:'☀️',half_am:'🌅',half_pm:'🌆'};
let rejId=null;

async function loadRequests(){
  const{data}=await sb.from('vacation_requests').select('*').order('req_date',{ascending:false});
  const all=data||[];
  const pend=all.filter(r=>r.status==='pending');
  const done=all.filter(r=>r.status!=='pending');
  renderList('pendList',pend,true);
  renderList('doneList',done,false);
}

function renderList(id,reqs,action){
  const el=document.getElementById(id);
  if(!reqs.length){el.innerHTML=`<div class="empty"><div class="icon">${action?'🎉':'📋'}</div><p>${action?'대기 중인 신청이 없습니다!':'완료된 내역이 없습니다.'}</p></div>`;return;}
  el.innerHTML=reqs.map(r=>`
    <div class="ri">
      <div class="rav">${r.emp_name[0]}</div>
      <div class="ri-info">
        <div class="rn">${r.emp_name} · ${r.type_name} <span style="color:var(--primary)">${r.days}일</span></div>
        <div class="rm">신청일: ${fmtDate(r.req_date)}</div>
        <div class="rp">📅 ${fmtDate(r.start_date)} ~ ${fmtDate(r.end_date)}</div>
        ${r.reason?`<div class="rr">"${r.reason}"</div>`:''}
        ${r.reject_reason?`<div style="font-size:12px;color:var(--danger);margin-top:3px">반려 사유: ${r.reject_reason}</div>`:''}
      </div>
      <span class="sb ${r.status==='pending'?'sp':r.status==='approved'?'sa':'sr'}">${r.status==='pending'?'⏳ 대기':r.status==='approved'?'✅ 승인':'🚫 반려'}</span>
      ${action?`<div class="ra"><button class="btn btn-s" onclick="approveReq(${r.id})">✅ 승인</button><button class="btn btn-d" onclick="openRej(${r.id})">🚫 반려</button></div>`:''}
    </div>
  `).join('');
}

async function approveReq(id){
  await sb.from('vacation_requests').update({status:'approved'}).eq('id',id);
  await loadAll();toast('휴가가 승인되었습니다. ✅','s');
}
function openRej(id){rejId=id;document.getElementById('rejReason').value='';document.getElementById('rejModal').classList.add('open');}
function closeModal(){document.getElementById('rejModal').classList.remove('open');}
async function confirmRej(){
  const r=document.getElementById('rejReason').value.trim();
  if(!r){toast('반려 사유를 입력해주세요.','e');return;}
  await sb.from('vacation_requests').update({status:'rejected',reject_reason:r}).eq('id',rejId);
  closeModal();await loadAll();toast('반려 처리되었습니다.','w');
}

async function loadEmployees(){
  const[{data:waiting},{data:approved}]=await Promise.all([
    sb.from('users').select('*').eq('approved',false).order('created_at',{ascending:false}),
    sb.from('users').select('*').eq('approved',true).order('name'),
  ]);
  const wc=document.getElementById('waitCard');
  if(!(waiting||[]).length){wc.style.display='none';}
  else{
    wc.style.display='block';
    document.getElementById('waitList').innerHTML=(waiting||[]).map(u=>`
      <div class="ri">
        <div class="rav">${u.name[0]}</div>
        <div class="ri-info"><div class="rn">${u.name}</div><div class="rm">입사일: ${fmtDate(u.join_date)} · 가입일: ${fmtDate(u.created_at)}</div></div>
        <span class="sb sp">⏳ 승인 대기</span>
        <div class="ra"><button class="btn btn-s" onclick="approveUser(${u.id})">✅ 승인</button><button class="btn btn-d" onclick="rejectUser(${u.id})">🗑️ 거절</button></div>
      </div>
    `).join('');
  }

  const tbody=document.getElementById('empBody');
  if(!(approved||[]).length){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">등록된 직원이 없습니다.</td></tr>`;return;}

  // 연차 통계
  const{data:allReqs}=await sb.from('vacation_requests').select('*').eq('status','approved');
  const reqs=allReqs||[];

  tbody.innerHTML=(approved||[]).map(u=>{
    const ur=reqs.filter(r=>r.emp_id===u.id);
    const usedA=ur.filter(r=>['annual','half_am','half_pm'].includes(r.type)).reduce((s,r)=>s+parseFloat(r.days),0);
    const usedS=ur.filter(r=>r.type==='summer').reduce((s,r)=>s+parseFloat(r.days),0);
    const diff=Math.floor((new Date()-new Date(u.join_date))/(1000*60*60*24));
    const elig=diff>=365;
    return`<tr>
      <td><div class="enc"><div class="eav">${u.name[0]}</div><div><div style="font-weight:600">${u.name}</div><div style="font-size:11px;color:var(--gray-400)">입사 ${diff}일째</div></div></div></td>
      <td>${fmtDate(u.join_date)}</td>
      <td><input type="text" class="di" value="${u.dept||''}" placeholder="부서/직급" onblur="saveDept(${u.id},this.value)"></td>
      <td>${elig?`<span style="font-size:13px">연차 <b>${usedA}/10</b>일 · 여름 <b>${usedS}/5</b>일</span>`:`<span style="font-size:12px;color:var(--gray-400)">입사 1년 미만</span>`}</td>
      <td><span class="sb sa">✅ 재직 중</span></td>
      <td><button class="btn btn-d" style="font-size:12px;padding:6px 12px" onclick="removeUser(${u.id})">삭제</button></td>
    </tr>`;
  }).join('');

  await loadStats();
}

async function approveUser(id){
  await sb.from('users').update({approved:true}).eq('id',id);
  await loadEmployees();await loadStats();toast('직원이 승인되었습니다. ✅','s');
}
async function rejectUser(id){
  if(!confirm('가입을 거절하면 해당 계정이 삭제됩니다.'))return;
  await sb.from('users').delete().eq('id',id);
  await loadEmployees();await loadStats();toast('가입이 거절되었습니다.','w');
}
async function removeUser(id){
  if(!confirm('직원을 삭제하면 모든 데이터가 삭제됩니다.'))return;
  await sb.from('vacation_requests').delete().eq('emp_id',id);
  await sb.from('users').delete().eq('id',id);
  await loadEmployees();await loadStats();toast('직원이 삭제되었습니다.','w');
}
async function saveDept(id,val){
  await sb.from('users').update({dept:val}).eq('id',id);
}

function changePw(){
  const cur=document.getElementById('curPw').value;
  const nw=document.getElementById('newPw').value;
  const nw2=document.getElementById('newPw2').value;
  const c=getAdminCreds();
  if(cur!==c.pw){toast('현재 비밀번호가 틀렸습니다.','e');return;}
  if(nw.length<4){toast('새 비밀번호는 4자 이상이어야 합니다.','e');return;}
  if(nw!==nw2){toast('새 비밀번호가 일치하지 않습니다.','e');return;}
  localStorage.setItem('hrflow_admin',JSON.stringify({id:c.id,pw:nw}));
  ['curPw','newPw','newPw2'].forEach(i=>document.getElementById(i).value='');
  toast('비밀번호가 변경되었습니다. ✅','s');
}

// Supabase Realtime — 신청 들어오면 자동 갱신
sb.channel('vacation_requests').on('postgres_changes',{event:'INSERT',schema:'public',table:'vacation_requests'},()=>{
  if(localStorage.getItem('hrflow_admin_auth')==='1') loadAll();
}).subscribe();
</script>
